name: Update PSN™ Database

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  update-database:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Download Official TSV files from NoPayStation
        run: |
          BASE_DIR="resources/database/official"
          mkdir -p "$BASE_DIR/pending"
          curl -L "https://nopaystation.com/tsv/PS3_GAMES.tsv" -o "$BASE_DIR/games.tsv"
          curl -L "https://nopaystation.com/tsv/PS3_AVATARS.tsv" -o "$BASE_DIR/avatars.tsv"
          curl -L "https://nopaystation.com/tsv/PS3_DEMOS.tsv" -o "$BASE_DIR/demos.tsv"
          curl -L "https://nopaystation.com/tsv/PS3_DLCS.tsv" -o "$BASE_DIR/dlcs.tsv"
          curl -L "https://nopaystation.com/tsv/PS3_THEMES.tsv" -o "$BASE_DIR/themes.tsv"
          # Downloads dos pendentes
          curl -L "https://nopaystation.com/tsv/pending/PS3_GAMES.tsv" -o "$BASE_DIR/pending/games.tsv"
          curl -L "https://nopaystation.com/tsv/pending/PS3_AVATARS.tsv" -o "$BASE_DIR/pending/avatars.tsv"
          curl -L "https://nopaystation.com/tsv/pending/PS3_DEMOS.tsv" -o "$BASE_DIR/pending/demos.tsv"
          curl -L "https://nopaystation.com/tsv/pending/PS3_DLCS.tsv" -o "$BASE_DIR/pending/dlcs.tsv"
          curl -L "https://nopaystation.com/tsv/pending/PS3_THEMES.tsv" -o "$BASE_DIR/pending/themes.tsv"

      - name: Clean TSV files
        run: |
          for file in resources/database/official/*.tsv resources/database/official/pending/*.tsv; do
            if [ -f "$file" ]; then
              awk -F'\t' 'NR==1 || ($4 != "MISSING" && $4 != "")' "$file" > "${file}.tmp"
              mv "${file}.tmp" "$file"
            fi
          done

      - name: Generate Latest Snippets
        run: |
          # Cria a pasta para os arquivos pequenos de "novidades"
          mkdir -p resources/database/latest
          
          # Função para pegar o cabeçalho + as últimas 20 linhas (mais recentes no NPS)
          generate_latest() {
            SRC=$1
            DEST=$2
            head -n 1 "$SRC" > "$DEST"
            tail -n 25 "$SRC" >> "$DEST"
          }

          generate_latest "resources/database/official/games.tsv" "resources/database/latest/latest_games.tsv"
          generate_latest "resources/database/official/dlcs.tsv" "resources/database/latest/latest_dlcs.tsv"
          generate_latest "resources/database/official/avatars.tsv" "resources/database/latest/latest_avatars.tsv"
          generate_latest "resources/database/official/demos.tsv" "resources/database/latest/latest_demos.tsv"

      - name: Commit and Push changes
        run: |
          git config --global user.name "PS3-Pro Bot"
          git config --global user.email "bot@ps3pro.com"
          git add resources/database/official/*.tsv resources/database/official/pending/*.tsv resources/database/latest/*.tsv
          git diff-index --quiet HEAD || git commit -m "Auto-update: Database & Latest Snippets"
          git push
name: Update PSN™ Database

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  update-database:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Update Database with Timestamps
        run: |
          BASE_DIR="resources/database/official"
          SCRIPT_PATH=".github/scripts/generate_latest_releases.py"
          
          mkdir -p "$BASE_DIR/pending"
          
          categories=("games" "avatars" "demos" "dlcs" "themes")
          
          for cat in "${categories[@]}"; do
            echo "Processando $cat..."
            
            curl -L "https://nopaystation.com/tsv/PS3_${cat^^}.tsv" -o "new_${cat}.tsv"
            python "$SCRIPT_PATH" "$BASE_DIR/${cat}.tsv" "new_${cat}.tsv"
            
            curl -L "https://nopaystation.com/tsv/pending/PS3_${cat^^}.tsv" -o "new_pending_${cat}.tsv"
            python "$SCRIPT_PATH" "$BASE_DIR/pending/${cat}.tsv" "new_pending_${cat}.tsv"
          done

      - name: Generate Latest Snippets
        run: |
          mkdir -p resources/database/latest
          
          generate_latest() {
            SRC=$1
            DEST=$2
            if [ -f "$SRC" ]; then
              head -n 1 "$SRC" > "$DEST"
              # Pega as últimas 50 linhas, limpa vazias e salva as 25 finais (que agora já têm data)
              tail -n 50 "$SRC" | grep -v "^$" | tail -n 25 >> "$DEST"
            fi
          }

          generate_latest "resources/database/official/games.tsv" "resources/database/latest/latest_games.tsv"
          generate_latest "resources/database/official/dlcs.tsv" "resources/database/latest/latest_dlcs.tsv"
          generate_latest "resources/database/official/avatars.tsv" "resources/database/latest/latest_avatars.tsv"
          generate_latest "resources/database/official/demos.tsv" "resources/database/latest/latest_demos.tsv"

      - name: Commit and Push changes
        run: |
          git config --global user.name "PS3-Pro Bot"
          git config --global user.email "bot@ps3pro.com"
          git add resources/database/official/*.tsv resources/database/official/pending/*.tsv resources/database/latest/*.tsv
          git diff-index --quiet HEAD || git commit -m "Auto-update: Synchronized with NoPayStation (Official & Pending)"
          git push
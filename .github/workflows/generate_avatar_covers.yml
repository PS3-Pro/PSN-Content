name: Generate Avatar Covers

on:
  schedule:
    # Runs every night after the NPS database sync workflow.
    - cron: "30 3 * * *"
  workflow_dispatch:
    inputs:
      source:
        description: "Which TSV source to process. Use changed for automatic detection."
        required: false
        default: "changed"
        type: choice
        options:
          - changed
          - official
          - pending
          - all
      title_id:
        description: "Optional Title ID filter. Example: BCUS98174 NPUB30114"
        required: false
        type: string
      content_id:
        description: "Optional Content ID filter. Example: UP9000-BCUS98174_00-UALASTOFUSELLIE0"
        required: false
        type: string
      limit:
        description: "Maximum number of matching avatar entries to process. Use 0 for all."
        required: false
        default: "0"
        type: string
      start:
        description: "Skip the first N matching avatar entries. Useful to continue in chunks."
        required: false
        default: "0"
        type: string
      overwrite:
        description: "Overwrite existing PNG files."
        required: false
        default: false
        type: boolean
      redownload:
        description: "Download PKGs again during this run."
        required: false
        default: false
        type: boolean
      force:
        description: "Force generation even if avatars TSV files did not change."
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  actions: write

concurrency:
  group: generate-avatar-covers
  cancel-in-progress: false

jobs:
  generate-avatar-covers:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Prepare official avatars TSV state
        id: official_hash
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p .avatar-cover-state/official

          official_tsv="resources/database/content/official/avatars.tsv"

          if [[ -f "$official_tsv" ]]; then
            hash="$(sha256sum "$official_tsv" | awk '{print $1}')"
          else
            hash="missing"
          fi

          echo "$hash" > .avatar-cover-state/official/hash.txt
          echo "hash=$hash" >> "$GITHUB_OUTPUT"
          echo "Official avatars TSV hash: $hash"

      - name: Prepare pending avatars TSV state
        id: pending_hash
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p .avatar-cover-state/pending

          pending_tsv="resources/database/content/official/pending/avatars.tsv"

          if [[ -f "$pending_tsv" ]]; then
            hash="$(sha256sum "$pending_tsv" | awk '{print $1}')"
          else
            hash="missing"
          fi

          echo "$hash" > .avatar-cover-state/pending/hash.txt
          echo "hash=$hash" >> "$GITHUB_OUTPUT"
          echo "Pending avatars TSV hash: $hash"

      - name: Check official avatars TSV cache
        id: official_state_cache
        uses: actions/cache/restore@v4
        with:
          path: .avatar-cover-state/official
          key: avatar-covers-official-${{ runner.os }}-${{ steps.official_hash.outputs.hash }}

      - name: Check pending avatars TSV cache
        id: pending_state_cache
        uses: actions/cache/restore@v4
        with:
          path: .avatar-cover-state/pending
          key: avatar-covers-pending-${{ runner.os }}-${{ steps.pending_hash.outputs.hash }}

      - name: Decide source to process
        id: decide
        shell: bash
        env:
          OFFICIAL_CACHE_HIT: ${{ steps.official_state_cache.outputs.cache-hit }}
          PENDING_CACHE_HIT: ${{ steps.pending_state_cache.outputs.cache-hit }}
          REQUESTED_SOURCE: ${{ github.event.inputs.source }}
          FORCE: ${{ github.event.inputs.force }}
        run: |
          set -euo pipefail

          requested_source="${REQUESTED_SOURCE:-changed}"
          force="${FORCE:-false}"

          official_changed="false"
          pending_changed="false"
          source_to_process="none"

          if [[ "$OFFICIAL_CACHE_HIT" != "true" ]]; then
            official_changed="true"
          fi

          if [[ "$PENDING_CACHE_HIT" != "true" ]]; then
            pending_changed="true"
          fi

          if [[ "$requested_source" != "changed" && -n "$requested_source" ]]; then
            source_to_process="$requested_source"
          elif [[ "$force" == "true" ]]; then
            source_to_process="all"
          elif [[ "$official_changed" == "true" && "$pending_changed" == "true" ]]; then
            source_to_process="all"
          elif [[ "$official_changed" == "true" ]]; then
            source_to_process="official"
          elif [[ "$pending_changed" == "true" ]]; then
            source_to_process="pending"
          else
            source_to_process="none"
          fi

          echo "official_changed=$official_changed"
          echo "pending_changed=$pending_changed"
          echo "source_to_process=$source_to_process"

          echo "source=$source_to_process" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        if: steps.decide.outputs.source != 'none'
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        if: steps.decide.outputs.source != 'none'
        run: |
          python -m pip install --upgrade pip
          pip install pycryptodomex pillow

      - name: Generate avatar covers
        if: steps.decide.outputs.source != 'none'
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SOURCE_TO_PROCESS: ${{ steps.decide.outputs.source }}
          TITLE_ID: ${{ github.event.inputs.title_id }}
          CONTENT_ID: ${{ github.event.inputs.content_id }}
          LIMIT: ${{ github.event.inputs.limit }}
          START: ${{ github.event.inputs.start }}
          OVERWRITE: ${{ github.event.inputs.overwrite }}
          REDOWNLOAD: ${{ github.event.inputs.redownload }}
        shell: bash
        run: |
          set -euo pipefail

          args=(
            --repo .
            --source "${SOURCE_TO_PROCESS}"
            --download-dir "$RUNNER_TEMP/avatar_pkgs"
            --limit "${LIMIT:-0}"
            --start "${START:-0}"
          )

          if [[ "${OVERWRITE:-false}" == "true" ]]; then
            args+=(--overwrite)
          fi

          if [[ "${REDOWNLOAD:-false}" == "true" ]]; then
            args+=(--redownload)
          fi

          for id in $(echo "${TITLE_ID:-}" | tr ',;' '  '); do
            if [[ -n "$id" ]]; then
              args+=(--title-id "$id")
            fi
          done

          for id in $(echo "${CONTENT_ID:-}" | tr ',;' '  '); do
            if [[ -n "$id" ]]; then
              args+=(--content-id "$id")
            fi
          done

          python .github/scripts/generate_avatar_covers.py "${args[@]}"

      - name: Remove temporary PKGs and extracted files
        if: always()
        shell: bash
        run: |
          rm -rf "$RUNNER_TEMP/avatar_pkgs" "$RUNNER_TEMP/avatar_extract" || true

      - name: Commit generated PNG covers only
        if: steps.decide.outputs.source != 'none'
        shell: bash
        run: |
          set -euo pipefail

          git config --global user.name "PS3-Pro Bot"
          git config --global user.email "bot@ps3pro.com"

          git add resources/database/covers/avatars

          if git diff --cached --quiet; then
            echo "No new avatar PNG covers to commit."
          else
            git commit -m "Auto-update: Generate avatar covers"
            git push
          fi

      - name: Save official avatars TSV state
        if: steps.decide.outputs.source != 'none' && steps.official_state_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .avatar-cover-state/official
          key: avatar-covers-official-${{ runner.os }}-${{ steps.official_hash.outputs.hash }}

      - name: Save pending avatars TSV state
        if: steps.decide.outputs.source != 'none' && steps.pending_state_cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: .avatar-cover-state/pending
          key: avatar-covers-pending-${{ runner.os }}-${{ steps.pending_hash.outputs.hash }}

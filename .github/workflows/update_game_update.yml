name: Update Game Updates Database

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: pip install requests

      - name: Generate TSV
        run: python .github/scripts/generate_updates.py

      - name: Commit Changes
        run: |
          git config --global user.name "PS3-Pro Bot"
          git config --global user.email "bot@ps3pro.com"
          git add resources/database/content/official/game_updates.tsv
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Auto-update: Game Updates Database"
          git push
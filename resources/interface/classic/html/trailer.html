<!DOCTYPE html>
<html>
<head>
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<title>PS3 Flash Player</title>
<style>
html,body{margin:0;padding:0;width:100%;height:100%;background:#000;color:#fff;font-family:Arial,sans-serif;text-align:center;overflow:hidden;}
#wrap{position:absolute;left:0;top:0;width:100%;height:100%;background:#000;overflow:hidden;}
#box{position:absolute;left:0;top:0;width:100%;height:100%;background:#000;overflow:hidden;}
object,embed{display:block!important;width:100%!important;height:100%!important;margin:0!important;padding:0!important;border:0!important;background:#000!important;}
#closeBtn{position:absolute;top:8px;right:8px;z-index:99999;width:34px;height:34px;line-height:31px;padding:0;margin:0;background:#cc0000;color:#fff;border:1px solid #ff7777;border-radius:4px;font-size:20px;font-weight:bold;text-align:center;text-decoration:none;cursor:pointer;box-sizing:border-box;}
#closeBtn:hover{background:#ff0000;}
.msg{position:absolute;left:0;top:0;width:100%;height:100%;background:#000;color:#fff;box-sizing:border-box;padding-top:220px;text-align:center;}
.msg h1{font-size:26px;line-height:32px;margin:0 0 12px 0;color:#66ccff;}
.msg p{font-size:16px;line-height:23px;color:#cfd6e0;margin:0 70px 16px 70px;}
.btn{display:inline-block;background:#001d55;color:#fff;border:1px solid #8fb8ff;border-radius:5px;padding:9px 16px;font-size:15px;font-weight:bold;text-decoration:none;margin:4px;}
.btn.red{background:#7e1111;border-color:#ff6969;}
</style>
<script>
function ps3Fullscreen(){
	try{window.moveTo(0,0);}catch(e1){}
	try{if(screen&&screen.width&&screen.height)window.resizeTo(screen.width,screen.height);}catch(e2){}
}
ps3Fullscreen();
try{setTimeout(ps3Fullscreen,80);setTimeout(ps3Fullscreen,450);setInterval(ps3Fullscreen,1500);window.onfocus=ps3Fullscreen;window.onresize=ps3Fullscreen;}catch(e3){}
function qs(name){
	var q=String(window.location.search||'').replace(/^\?/, '').split('&');
	for(var i=0;i<q.length;i++){
		var p=q[i].split('=');
		try{if(decodeURIComponent(p[0]||'')===name)return decodeURIComponent(String(p[1]||'').replace(/\+/g,' '));}catch(e){}
	}
	return '';
}
function esc(s){return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function cleanVideo(s){return String(s||'').replace(/[^A-Za-z0-9_-]/g,'');}
function safeCb(s){return String(s||'').replace(/[^A-Za-z0-9_-]/g,'');}
function getReturnUrl(){return qs('return') || '';}
function ps3ClosePlayer(){
	var ret=getReturnUrl();
	try{if(window.opener&&window.opener.focus)window.opener.focus();}catch(e0){}
	try{window.close();}catch(e1){}
	try{setTimeout(function(){ if(ret){ location.href=ret; } else { history.back(); } },120);}catch(e2){ if(ret) location.href=ret; }
	return false;
}
function closeButtonHtml(){return '<a id="closeBtn" href="#" onclick="return ps3ClosePlayer();">X</a>';}
function showMessage(title,text,err){
	document.write('<div id="wrap">'+closeButtonHtml()+'<div class="msg"><h1 style="color:'+(err?'#ff6666':'#66ccff')+'">'+esc(title)+'</h1><p>'+esc(text)+'</p><a class="btn red" href="#" onclick="return ps3ClosePlayer();">Close / Back</a></div></div>');
}
function writeVideoPlayer(){
	ps3Fullscreen();
	var video=cleanVideo(qs('video'));
	var state=qs('state')||'video';
	var title=qs('title')||'Gameplay';
	var cb=safeCb(qs('cb'))||String(new Date().getTime());
	document.title=title;
	if(state==='loading'){
		showMessage('Searching video...', 'The trailer player will start here when the video is found.', false);
		return;
	}
	if(state==='error' || !video){
		showMessage('No video found', 'Go back to the database and try another title.', true);
		return;
	}
	var swf='https://github.com/PS3-Pro/Pages/raw/main/resources/swf/video_player/video_player_27.swf?cb='+cb;
	var videoUrl='http://youtube.ps3-pro.workers.dev/video/'+video+'.mp4';
	var flashvars='fichier='+videoUrl+'&auto_play=true&apercu=';
	var id='ps3_flash_video_'+cb;
	var w=960,h=540;
	try{if(screen&&screen.width)w=screen.width;}catch(e1){}
	try{if(screen&&screen.height)h=screen.height;}catch(e2){}
	document.write('<div id="wrap">'+closeButtonHtml()+'<div id="box"><object id="'+esc(id)+'_obj" name="'+esc(id)+'_obj" classid="clsid:d27cdb6e-ae6d-11cf-96b8-444553540000" codebase="http://fpdownload.macromedia.com/pub/shockwave/cabs/flash/swflash.cab#version=8,0,0,0" width="'+w+'" height="'+h+'"><param name="movie" value="'+esc(swf)+'"><param name="quality" value="low"><param name="scale" value="exactfit"><param name="salign" value="tl"><param name="bgcolor" value="#000000"><param name="wmode" value="opaque"><param name="allowScriptAccess" value="always"><param name="allowFullScreen" value="true"><param name="flashvars" value="'+esc(flashvars)+'"><embed id="'+esc(id)+'_emb" name="'+esc(id)+'_emb" src="'+esc(swf)+'" width="'+w+'" height="'+h+'" quality="low" scale="exactfit" salign="tl" bgcolor="#000000" wmode="opaque" allowScriptAccess="always" allowFullScreen="true" flashvars="'+esc(flashvars)+'" type="application/x-shockwave-flash"></embed></object></div></div>');
}
writeVideoPlayer();
</script>
</head>
<body></body>
</html>
